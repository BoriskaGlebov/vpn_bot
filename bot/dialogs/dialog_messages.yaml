            🔀 Раздельное туннелирование — удобно и без постоянных переключений.

            Эта функция позволяет выбрать, какие приложения работают через VPN, а какие — напрямую.

            Больше не нужно постоянно включать и выключать VPN вручную 👍

            📲 Как настроить (Только для приложения AmneziaVPN)
            Для IOs есть инструкция как скачать <a href="https://m-docs-3w5hsuiikq-ez.a.run.app/ru/documentation/instructions/installing-amneziavpn-on-ios/">AmneziaVPN</a>

