    split: |
        Раздельное туннелирование в AmneziaVPN
        Раздельное туннелирование в AmneziaVPN позволяет выбрать,
        какие приложения работают через VPN, а какие — напрямую.
        Больше не нужно постоянно включать и выключать VPN вручную
        📲 Как настроить (Только для приложения AmneziaVPN ВАЖНО)
          Для IOs есть инструкция как скачать https://m-docs-3w5hsuiikq-ez.a.run.app/ru/documentation/instructions/installing-amneziavpn-on-ios/

        Это удобно, если VPN нужен только для отдельных сервисов.

        Как настроить:
        1. Отключите активное VPN-соединение.
        2. Перейдите в раздел «Раздельное туннелирование приложений».
         Так как не придется сложно настраивать адреса для сайтов.
        3. Выберите режим маршрутизации.
         Теперь нужно решить
          🔹 Какие приложения будут работать через VPN
          🔹 Какие — без VPN
          💡 Выбирайте тот вариант, где приложений меньше — так быстрее и удобнее.
        Примеры

          Если VPN нужен только для WhatsApp → Выбрть <b>“Приложениия из списка рабоатают через VPN”</b>.

          Если наоборот VPN нужен для всего, кроме банков/госуслуг → Выбрать из списка <b>“Приложения из списка не должны работать через VPN”</b>.
        4. Добавьте приложения в список.
        5. Сохраните настройки.
        6. Снова включите VPN.

        ⚠️  Важно  ⚠️

        Некоторые телефоны могут автоматически отключать VPN для экономии памяти или батареи.
        Рекомендуется
        Добавить VPN-приложение в исключения энергосбережения
        Разрешить работу в фоне
        Это обеспечит стабильную работу VPN без отключений.
