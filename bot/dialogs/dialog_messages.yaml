            🗿 Теперь нужно решить
            🔹 Какие приложения будут работать через VPN
            🔹 Какие — без VPN
            💡 Выбирайте тот вариант, где приложений меньше — так быстрее и удобнее.
          - |
            4. Примеры

            Если VPN нужен только для WhatsApp → Выбрть <b>“Приложениия из списка рабоатают через VPN”</b>.

            Если наоборот VPN нужен для всего, кроме банков/госуслуг → Выбрать из списка <b>“Приложения из списка не должны работать через VPN”</b>.
