  instructions_ai:
    description: |
      Описание VPN Boriska
      Зачем нужен бот, для чего использовать VPN
      VPN Boriska — это Telegram-бот для получения конфигурационных файлов VPN.

      Бот создает персональный конфигурационный файл для подключения к VPN-серверу.

      Поддерживаются два приложения (Конфиг файлы подходит для двух приложений):
      • AmneziaVPN
      • AmneziaWG

      Один конфигурационный файл предназначен только для одного устройства.
      Один конфиг файл = одно устройство.
      Нельзя использовать один и тот же файл на разных устройствах.
      Если правило нарушить, то приложение не сможет корректно работать на этих устройствах, ведь не сможет понять куда отправлять
      весь ваш трафик.

      Если бот не знает ответа, то всегда можно написать напрямую разработчику @BorisisTheBlade.

      Для подключения в VPN на другом устройстве надо получить конфиг файл в боте и отправить или перенести его
                на другое устройство, где следуя всем инструкциям осуществить подключение.
