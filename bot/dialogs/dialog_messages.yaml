    proxy: |
      Использование Amnezia Proxy Прокси Proxy Telegram
      Amnezia Proxy — это альтернатива VPN для Telegram.

      Прокси защищает соединение и помогает обходить блокировки,
      но влияет только на работу Telegram.

      Для стабильной работы рекомендуется использовать
      либо VPN, либо прокси — не одновременно.

      🔗 Чтобы добавить прокси в Telegram:

        Нажми кнопку ниже — настройки откроются автоматически,
        и прокси добавится в один клик.
      ⚠️ Важно: для стабильной работы Telegram лучше использовать
        что-то одно — либо прокси, либо VPN.

        Если у тебя включён VPN с раздельным туннелированием,
        убедись, что Telegram не направляется одновременно и через VPN, и через прокси — это может ухудшить соединение.
      ℹ️ В любой момент ты можешь отключить прокси в настройках Telegram:
        Настройки → Данные и память → Прокси.
