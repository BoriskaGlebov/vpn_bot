# Используем стандартный формат main (он уже определён в nginx.conf)
access_log /var/log/nginx/access.log main;
access_log /dev/stdout main;

error_log /var/log/nginx/error.log warn;
error_log /dev/stderr warn;
# ---------------------------------------------------------
# Глобальные настройки (http-контекст)
# ---------------------------------------------------------
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

map $http_user_agent $bad_user_agent {
    default 0;
    ~*(sqlmap|nikto|nmap|zgrab|dirbuster|masscan|wpscan|curl|wget|python) 1;
}

# ---------------------------------------------------------
# HTTP -> HTTPS редирект
# ---------------------------------------------------------
server {
    listen 206.245.131.183:80;
    server_name help-blocks.ru www.help-blocks.ru;

    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    if ($bad_user_agent) {
        return 403;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------
# HTTPS сервер
# ---------------------------------------------------------
server {
    listen 206.245.131.183:443 ssl;
    http2 on;
    server_name help-blocks.ru www.help-blocks.ru;

    server_tokens off;

    # SSL сертификаты
    ssl_certificate /etc/letsencrypt/live/help-blocks.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/help-blocks.ru/privkey.pem;
    ssl_dhparam /etc/ssl/private/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # Защитные заголовки
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Ограничения
    limit_req zone=req_limit burst=20 nodelay;
    limit_conn conn_limit 20;

    # Блокировка вредоносных User-Agent
    if ($bad_user_agent) {
        return 403;
    }

    # -----------------------------------------------------
    # Защита от доступа к скрытым файлам (.git, .env и др.)
    # -----------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Блокировка конфигурационных и резервных файлов
    location ~* \.(env|ini|log|conf|yml|yaml|sql|bak|old)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Блокировка системных путей
    location ~* ^/(?:etc|proc|sys|root|home|var|boot|usr)/ {
        deny all;
    }

    # Блокировка Tomcat Manager
    location ^~ /manager/ {
        deny all;
    }

    # -----------------------------------------------------
    # Статические файлы
    # -----------------------------------------------------
    location /bot/admin/statics/ {
        alias /usr/src/app/static/statics/;
        autoindex off;
        try_files $uri =404;
        access_log off;
    }

    location /bot/admin/templates/ {
        alias /usr/src/app/templates/;
        autoindex off;
        try_files $uri =404;
        access_log off;
    }

    # -----------------------------------------------------
    # Telegram Webhook (разрешены только IP Telegram)
    # -----------------------------------------------------
    location = /bot/webhook {
        allow 91.108.0.0/16;
        allow 149.154.160.0/20;
        deny all;

        proxy_pass http://127.0.0.1:8088/bot/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # -----------------------------------------------------
    # Проксирование FastAPI
    # -----------------------------------------------------
    location /bot/ {
        proxy_pass http://127.0.0.1:8088/bot/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
}
