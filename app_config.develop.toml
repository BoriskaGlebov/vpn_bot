# === DB ===
[db]
# * Настройки базы данных PostgreSQL по умолчанию postgres
host = "postgres"
# по умолчани порт 5432
port = 5432
user = "user_vpn"
database = "vpn_boriska_db"
#Размерность для эмбеддингов по умолчанию Яндекс использует 256  и на локально модели тот же парметр
embedding_dim = 256

# === REDIS ===
[redis]
# *Контекнер Redis по умолчанию redis
host = "redis"
# по умолчанию порт 6379
port = 6379
# по умолачанию пишит все в 0 базу
db = 1
# по умолчанию 3600 секунд время жизни кэша редис
default_expire = 3600
user = "vpn_user"

# === STORAGE ===
[bucket]
#Bucket настройки
bucket_name = "vpn-bot-images"
prefix = "media/"
endpoint_url = "https://storage.yandexcloud.net"

# === AI ===
[ai]
#AI модель указвать только на локальной разработке так все через яндекс идет
#Размерность для эмбеддингов 256 такую LLM нало брать, что б в БД положить
model_name = "intfloat/multilingual-e5-small"
#по умослчани нормализация TRUE
normalize = true
