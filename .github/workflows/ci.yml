name: CI

on:
  pull_request:
    types: [ opened, reopened,synchronize ]
  push:
    branches: [ main, develop,nginx ]

jobs:
  lint:
    if: github.ref != 'refs/heads/nginx'
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12", "3.13" ]
        poetry-version: [ "latest", "main", "1.8.0" ]
        os: [ ubuntu-latest, ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ matrix.poetry-version }}

      - name: View poetry --help
        run: poetry --help
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          poetry install --only dev --no-root --no-interaction --no-ansi
      - name: Run Black
        run: poetry run black --check .
      - name: Run isort
        run: poetry run isort --check-only --profile black .
      - name: Run Ruff
        run: poetry run ruff check .
      - name: Run Ruff Format
        run: poetry run ruff format --check .
      - name: Run mypy
        run: poetry run mypy .

  test:
    if: github.ref != 'refs/heads/nginx'
    runs-on: ubuntu-latest
    needs: lint
    environment: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: "1.8.0"

      - name: View poetry --help
        run: poetry --help
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          poetry install --no-root --with dev
      - name: Run tests
        env:
          ENV_FILE: .env.test
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DB_PASSWORD: ${{ vars.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ vars.REDIS_PASSWORD }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SKIP_AI_INIT: ${{ vars.SKIP_AI_INIT }}
          SOF_X_RAY_PASSWORD: ${{ vars.SOF_X_RAY_PASSWORD }}
        run: poetry run pytest -vs .

  deploy_develop:
    needs: [ lint, test ]
    runs-on: ubuntu-latest
    environment: develop
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server (DEV)
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: echo "${{ secrets.SERVER_IP }} $(ssh-keyscan -H ${{ secrets.SERVER_IP }})" >> ~/.ssh/known_hosts

      - name: Test SSH  connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "whoami" && echo PRIVET # Проверка подключения

      - name: Recreate .env and restart containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'SSH_EOF'
            set -e

            # ===== ЯВНЫЙ ЗАПУСК SSH-AGENT =====
            # Запускаем агент, если не запущен
            if [ -z "$SSH_AUTH_SOCK" ] || [ ! -S "$SSH_AUTH_SOCK" ]; then
              eval $(ssh-agent) > /dev/null
              echo "SSH agent started with socket: $SSH_AUTH_SOCK"
            fi

            # Добавляем ключи
            if [ -f ~/.ssh/help_blocks ]; then
              ssh-add ~/.ssh/help_blocks < /dev/null 2>/dev/null
              echo "SSH key added"
            fi

            # Добавляем ключи
            if [ -f ~/.ssh/xray_boriska ]; then
              ssh-add ~/.ssh/xray_boriska < /dev/null 2>/dev/null
              echo "SSH key added"
            fi

            # Проверяем что ключи добавились
            ssh-add -l
            # ===== КОНЕЦ НАСТРОЙКИ АГЕНТА =====

            cd /home/prod_server/production/vpn_bot || exit 1
            echo "Pull latest code..."
            git checkout develop
            git fetch origin develop
            git reset --hard origin/develop
            git clean -fd

            echo "Recreate .env.dev file..."
            rm -f .env.dev

            cat <<ENV_EOF > .env.dev

          # == STAGE ==

          STAGE=develop

          # == CORE ==

          BOT_TOKEN=${{ secrets.BOT_TOKEN }}

          # == API ==

          SESSION_SECRET=${{ secrets.SESSION_SECRET }}

          # ==X-RAY ==

          SOF_X_RAY_PASSWORD=${{ secrets.SOF_X_RAY_PASSWORD }}


          # == DATABASE ==

          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          # == REDIS ==

          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

          # == STORAGE ==

          ACCESS_KEY=${{ secrets.ACCESS_KEY }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}

          # == AI ==
          ACCESS_KEY_AI=${{ secrets.ACCESS_KEY_AI }}
          SECRET_KEY_AI=${{ secrets.SECRET_KEY_AI }}
          SKIP_AI_INIT=${{ vars.SKIP_AI_INIT }}
          ENV_EOF

            echo "SSH_AUTH_SOCK добавляю в .env.dev"
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> .env.dev
            echo "Restart Docker containers..."
            make compose-down
            make compose-up

            docker restart nginx
          SSH_EOF


  deploy_prod:
    needs: [ lint, test ]
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server (DEV)
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: echo "${{ secrets.SERVER_IP }} $(ssh-keyscan -H ${{ secrets.SERVER_IP }})" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "whoami" && echo PRIVET

      - name: Update telemt.toml with secret
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            cd /home/vpn_user/test_zone/vpn_bot || exit 1

            git checkout main
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            TELEMT_SECRET_HELLO="${{ secrets.TELEMT_SECRET_HELLO }}"
            TOML_FILE="./telemt-config/telemt.toml"

            echo "DEBUG: TELEMT_SECRET_HELLO=$TELEMT_SECRET_HELLO"

            if grep -q '^hello\s*=' "$TOML_FILE"; then
              sed -i "s/^hello\s*=.*/hello = \"$TELEMT_SECRET_HELLO\"/" "$TOML_FILE"
            else
              echo "hello = \"$TELEMT_SECRET_HELLO\"" >> "$TOML_FILE"
            fi
          EOF

      - name: Recreate .env and restart containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'SSH_EOF'
            set -e

            # ===== ЯВНЫЙ ЗАПУСК SSH-AGENT =====
            if [ -z "$SSH_AUTH_SOCK" ] || [ ! -S "$SSH_AUTH_SOCK" ]; then
              eval $(ssh-agent) > /dev/null
              echo "SSH agent started with socket: $SSH_AUTH_SOCK"
            fi

            if [ -f ~/.ssh/vpn_boriska ]; then
              ssh-add ~/.ssh/vpn_boriska < /dev/null 2>/dev/null
              echo "SSH key added"
            fi

            if [ -f ~/.ssh/xray_boriska ]; then
              ssh-add ~/.ssh/xray_boriska < /dev/null 2>/dev/null
              echo "SSH key added"
            fi

            # Проверяем что ключи добавились
            ssh-add -l
            # ===== КОНЕЦ НАСТРОЙКИ АГЕНТА =====


            cd /home/vpn_user/test_zone/vpn_bot || exit 1

            echo "Recreate .env file..."
            rm -f .env

            cat <<ENV_EOF > .env

          # == STAGE ==

          STAGE=prod

          # == CORE ==

          BOT_TOKEN=${{ secrets.BOT_TOKEN }}

          # == API ==

          SESSION_SECRET=${{ secrets.SESSION_SECRET }}

          # ==X-RAY ==

          SOF_X_RAY_PASSWORD=${{ secrets.SOF_X_RAY_PASSWORD }}


          # == DATABASE ==

          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          # == REDIS ==

          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

          # == STORAGE ==

          ACCESS_KEY=${{ secrets.ACCESS_KEY }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}

          # == AI ==
          ACCESS_KEY_AI=${{ secrets.ACCESS_KEY_AI }}
          SECRET_KEY_AI=${{ secrets.SECRET_KEY_AI }}
          SKIP_AI_INIT=${{ vars.SKIP_AI_INIT }}
          ENV_EOF

            echo "SSH_AUTH_SOCK добавляю в .env"
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> .env

            echo "Restart Docker containers..."
            make compose-down STAGE=prod
            make compose-up STAGE=prod
          SSH_EOF

  deploy_nginx:
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/nginx'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server (DEV)
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: echo "${{ secrets.SERVER_IP }} $(ssh-keyscan -H ${{ secrets.SERVER_IP }})" >> ~/.ssh/known_hosts  # Добавление сервера в known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "whoami" && echo PRIVET # Проверка подключения

      - name: Recreate .env and restart containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << EOF
            set -e
            cd /home/prod_server/test_zone/vpn_bot || exit 1
            echo "Pull latest code..."
            git checkout nginx
            git fetch origin nginx
            git reset --hard origin/nginx
            git clean -fd

            echo "Recreate .env.local file..."
            rm -f .env.local
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env.local

            echo "VPN_HOST=${{ secrets.VPN_HOST }}" >> .env.local
            echo "VPN_USERNAME=${{ secrets.VPN_USERNAME }}" >> .env.local
            echo "VPN_CONTAINER=${{ secrets.VPN_CONTAINER }}" >> .env.local
            echo "MAX_CONFIGS_PER_USER=${{ vars.MAX_CONFIGS_PER_USER }}" >> .env.local

            echo "ADMIN_IDS=${{ secrets.ADMIN_IDS }}" >> .env.local

            echo "PRICE_MAP=${{ vars.PRICE_MAP }}" >> .env.local

            echo "BASE_SITE=${{ vars.BASE_SITE }}" >> .env.local

            echo "DB_USER=${{ secrets.DB_USER }}" >> .env.local
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.local
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env.local

            echo "REDIS_USER=${{ secrets.REDIS_USER }}" >> .env.local
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env.local

            echo "USE_POLLING=${{ vars.USE_POLLING }}" >> .env.local

            echo "BUCKET_NAME=${{ vars.BUCKET_NAME }}" >> .env.local
            echo "PREFIX=${{ vars.PREFIX }}" >> .env.local
            echo "ENDPOINT_URL=${{ secrets.ENDPOINT_URL }}" >> .env.local
            echo "ACCESS_KEY=${{ secrets.ACCESS_KEY }}" >> .env.local
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env.local
            echo "USE_LOCAL=${{ vars.USE_LOCAL }}" >> .env.local


            echo "Restart Docker containers..."
            make compose-down
            make compose-up

          EOF
